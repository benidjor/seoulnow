name: scp

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: scp-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    container_name: scp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: scp
      POSTGRES_PASSWORD: scp_dev_password
      POSTGRES_DB: scp
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scp -d scp"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: scp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: scp-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/seoul-warehouse || true) &&
      (mc mb local/lakekeeper || true) &&
      mc anonymous set none local/seoul-warehouse &&
      echo 'minio buckets ready'
      "
    restart: "no"

  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:v0.5
    container_name: scp-lakekeeper-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_ENCRYPTION_KEY: scp-dev-key-do-not-use-in-prod
      RUST_LOG: info
    command: ["migrate"]
    restart: "no"

  lakekeeper:
    image: quay.io/lakekeeper/catalog:v0.5
    container_name: scp-lakekeeper
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      lakekeeper-migrate:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_ENCRYPTION_KEY: scp-dev-key-do-not-use-in-prod
      LAKEKEEPER__BASE_URI: http://localhost:8181
      LAKEKEEPER__LISTEN_PORT: 8181
      RUST_LOG: info
    command: ["serve"]
    healthcheck:
      test: ["CMD", "/home/nonroot/iceberg-catalog", "healthcheck", "-s"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  kafka_data:
  postgres_data:
  minio_data:
