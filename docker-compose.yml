name: scp

# Airflow common config (Task 5.5) — webserver / scheduler / init 가 공유.
# LocalExecutor + 기존 scp-postgres 안 airflow_meta DB backend (plan 의 SQLite
# metadata 미사용 — Airflow 2.10 의 LocalExecutor 가 SQLite 와 lock 충돌이라
# 별도 Postgres backend 필요. 별도 container 안 띄우고 기존 postgres 재사용
# 하여 메모리 mitigation 의도 보존).
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://scp:scp_dev_password@postgres:5432/airflow_meta
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__PARSING_PROCESSES: "1"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "300"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    # Day 6 hotfix — dbt python model 의 platform_common.config.Settings 가
    # 컨테이너 안에서 docker network DNS 로 lakekeeper / minio 에 도달하도록
    # 강제. default (`http://localhost:...`) 는 self loopback 라 컨테이너에서
    # 무효.
    LAKEKEEPER_URL: http://lakekeeper:8181
    MINIO_ENDPOINT: http://minio:9000
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    # dbt project 마운트 — Task 5.6 dbt_full_run DAG 의 BashOperator 가
    # /opt/airflow/dbt/seoul 안에서 dbt CLI 호출. profiles.yml 도 host bind
    # 라 Airflow container 와 host 가 같은 file 공유 (target/ 도 자동 sync).
    - ./dbt:/opt/airflow/dbt
    # Day 6 hotfix — dbt python model `stg_hotspot_silver` 가 host 와 동일
    # 하게 `flink_jobs.lib.duckdb_iceberg` / `platform_common.config` 를
    # import. PYTHONPATH 는 dbt_full_run.py 의 dbt_env 에서 잡아준다.
    - ./src:/opt/airflow/repo-src:ro

services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: scp-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Day 6 Task 6.1 — listener dual-mode.
      # EXTERNAL://localhost:9092 → host (macOS) 측 client (PyFlink, host dbt
      # subprocess, confluent_kafka producer) 가 그대로 사용.
      # INTERNAL://kafka:29092 → docker network 안 client (kafka-connect,
      # Debezium) 가 사용. advertised 가 localhost 1개였을 때는 docker network
      # 안 컨테이너에서 self-loopback 으로 빠져 broker resolve 가 깨졌었음.
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # single-node 환경 — internal 토픽 (__consumer_offsets / __transaction_state) 의
      # default replication factor 3 이라 broker 1개 환경에서 토픽 생성 stuck 발생.
      # 1로 명시해 KRaft single-node 에서 정상 동작.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    container_name: scp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: scp
      POSTGRES_PASSWORD: scp_dev_password
      POSTGRES_DB: scp
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scp -d scp"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: scp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: scp-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/seoul-warehouse || true) &&
      (mc mb local/lakekeeper || true) &&
      mc anonymous set none local/seoul-warehouse &&
      echo 'minio buckets ready'
      "
    restart: "no"

  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:v0.12.1
    container_name: scp-lakekeeper-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_ENCRYPTION_KEY: scp-dev-key-do-not-use-in-prod
      RUST_LOG: info
    command: ["migrate"]
    restart: "no"

  lakekeeper:
    image: quay.io/lakekeeper/catalog:v0.12.1
    container_name: scp-lakekeeper
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      lakekeeper-migrate:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://scp:scp_dev_password@postgres:5432/scp
      LAKEKEEPER__PG_ENCRYPTION_KEY: scp-dev-key-do-not-use-in-prod
      # Iceberg REST `/v1/config` 의 `overrides.uri` 로 vend 되어 client `uri`
      # kwargs 를 강제 override (REST spec 상 server overrides 가 client kwargs
      # 를 덮어씀). docker network 안 client (Airflow dbt subprocess) 에서는
      # `localhost` = self → connection refused. 그래서 docker-friendly hostname
      # 으로 통일하고, host 측 client (PyFlink, dbt host run, slo_metrics) 는
      # `/etc/hosts` 에 `127.0.0.1 lakekeeper minio` 를 추가해 동일 hostname 으로
      # port mapping 통과시킨다 (README Quick Start 의 host setup 절).
      LAKEKEEPER__BASE_URI: http://lakekeeper:8181
      LAKEKEEPER__LISTEN_PORT: 8181
      RUST_LOG: info
    command: ["serve"]
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck", "-s"]
      interval: 10s
      timeout: 5s
      retries: 18

  # Airflow 4 service (Task 5.5).
  # 기존 scp-postgres 안 airflow_meta DB 1회 생성 (멱등) → airflow-init 의 db
  # migrate + admin user 생성 1회 → webserver / scheduler 가동.
  postgres-airflow-bootstrap:
    image: postgres:16
    container_name: scp-postgres-airflow-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: scp_dev_password
    entrypoint: >
      /bin/sh -c "
      psql -h postgres -U scp -d scp -tc \"SELECT 1 FROM pg_database WHERE datname='airflow_meta'\" | grep -q 1 ||
      psql -h postgres -U scp -d scp -c 'CREATE DATABASE airflow_meta'
      "
    restart: "no"

  airflow-init:
    <<: *airflow-common
    container_name: scp-airflow-init
    depends_on:
      postgres-airflow-bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: scp-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: scp-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  # Day 6 Task 6.1 — Kafka Connect (Debezium runtime).
  # docker network 안 client 라 BOOTSTRAP_SERVERS 는 INTERNAL listener
  # (kafka:29092) 사용. Debezium Postgres connector 는 register.sh 가
  # /connectors REST API 로 별도 등록 (Task 6.2).
  kafka-connect:
    image: debezium/connect:2.7
    container_name: scp-kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: scp-connect
      CONFIG_STORAGE_TOPIC: _scp_connect_configs
      OFFSET_STORAGE_TOPIC: _scp_connect_offsets
      STATUS_STORAGE_TOPIC: _scp_connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  kafka_data:
  postgres_data:
  minio_data:
