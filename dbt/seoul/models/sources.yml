version: 2

# silver schema sources.
#
# Iceberg `silver.*` 테이블을 dbt source 로 등록한다. 실 read 경로는 Lakekeeper
# REST → pyiceberg `plan_files()` → DuckDB `read_parquet()` 우회 패턴
# (`flink_jobs.lib.duckdb_iceberg`) 으로 staging python model 안에서 이루어지며,
# 본 source 정의는 lineage / docs / 추후 freshness check 의 단일 출처 metadata
# 역할.
sources:
  - name: silver
    description: PyFlink streaming → Iceberg silver layer (정규화 + 행정구역 join 후 단계).
    meta:
      iceberg_namespace: silver
    tables:
      - name: dim_place
        description: SCD Type 2 골격 — 각 CDC 변경마다 append. valid_to 닫기는 Day 9 Spark MERGE 가 담당.
        meta:
          external_location: "s3://seoul-warehouse/warehouse/silver/dim_place"
        columns:
          - name: place_id
          - name: cdc_op
          - name: valid_from
          - name: valid_to
          - name: is_current
